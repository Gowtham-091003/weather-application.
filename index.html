<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App.</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter Your City Here...">
            <button><img src="./assets/search.png" alt=""></button>
        </div>

        <div class="error">
            <p>Invalid Place</p>
        </div>

        <div class="Weather">
            <img src="./assets/clear.png" alt="" class="Weather-icon">
            <h1 class="temp">27°C</h1>
            <h1 class="city">New York</h1>
        </div>

        <div class="details">
            <div class="col">
                <img src="./assets/humidity.png" alt="" class="Weather-icon">
                <div>
                    <p class="humidity">50%</p>
                    <p >Humidity</p>
                </div>
            </div>

            <div class="col">
                <img src="./assets/wind.png" alt="" class="Weather-icon">
                <div>
                    <p class="wind">50 Km/hr</p>
                    <p >Wind</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apikey="4e7e4bfeb5cf474d052fec79eff10e6c";
        const apiurl="https://api.openweathermap.org/data/2.5/weather?units=metric";

        const searchBox = document.querySelector(".search input");
        const searchBtn = document.querySelector(".search button");
        const weathericon=document.querySelector(".Weather-icon");
            
        async function checkweather(city) {
            const response=await fetch(`${apiurl}&q=${city}&appid=${apikey}`)
            const data=await response.json();
                if (data.cod == 404) {
                    document.querySelector(".error").style.display="block";
                }
                else {
                    document.querySelector(".error").style.display="none";
                }
            document.querySelector(".city").innerHTML = data.name;
            document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
            document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
            document.querySelector(".wind").innerHTML = data.wind.speed + "Km/hr";

                if(data.weather[0].main == "Clouds") {
                weathericon.src = "assets/clouds.png";
                }
                else if(data.weather[0].main == "Clear") {
                    weathericon.src = "assets/clear.png";
                }
                else if(data.weather[0].main == "Rain") {
                    weathericon.src = "assets/rain.jpeg";
                }
                else if(data.weather[0].main == "Drizzle") {
                    weathericon.src = "assets/rain.jpeg";
                }
                else if(data.weather[0].main == "Mist") {
                    weathericon.src = "assets/snow.png";
                }
            document.querySelector(".Weather").style.display="block";
            document.querySelector(".details").style.display="flex";
        }
        searchBtn.addEventListener("click", () => {
            checkweather(searchBox.value)
        });
    </script>
</body>
</html>
